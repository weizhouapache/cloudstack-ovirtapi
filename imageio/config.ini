[imageio]
listen_host = 0.0.0.0
listen_port = 54322     # 54323 for Proxy mode
path = /images
public_ip =
internal_token = 1234567890     # The token used to authenticate the Internal upload/download/backup

[proxy]
proxy_listen_host = 0.0.0.0
proxy_listen_port = 54323
proxy_public_ip =
proxy_internal_token = 1234567890     # The token used to authenticate the Internal upload/download/backup to Transfer host


[ssl]
ca_cert_file = ./certs/root-ca.crt
ca_key_file = ./certs/root-ca.key   # Required only if cert_file or key_file are missing
cert_file = ./certs/server.crt
key_file  = ./certs/server.key

[logging]
level = DEBUG
file = ./logs/imageio.log

