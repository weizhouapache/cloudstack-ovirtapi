[server]
host = 0.0.0.0
port = 443
path = /ovirt-engine
public_ip =

[ssl]
ca_cert_file = ./certs/root-ca.crt
ca_key_file = ./certs/root-ca.key   # Required only if cert_file or key_file are missing
cert_file = ./certs/server.crt
key_file  = ./certs/server.key

[cloudstack]
endpoint = http://localhost:8080/client/api

[security]
hmac_secret = very-long-random-secret

[logging]
level = DEBUG
file = ./logs/app.log

[imageio]
internal_token = 1234567890     # The token used to authenticate the Internal upload/download/backup to Transfer host

